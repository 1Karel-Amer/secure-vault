<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #0a0a0a;
      color: #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
    }
    h1 { font-size: 1.1rem; color: #555; letter-spacing: 0.1em; }
    p  { font-size: 0.85rem; color: #333; }
    .step {
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 2rem;
      width: 320px;
      display: none;
      flex-direction: column;
      gap: 0.8rem;
    }
    .step.active { display: flex; }
    .step h2 { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 0.15em; }
    .step label { font-size: 0.75rem; color: #555; }
    .step input {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      color: #aaa;
      font-family: monospace;
      font-size: 0.9rem;
      padding: 0.5rem 0.6rem;
      width: 100%;
      outline: none;
    }
    .step input:focus { border-color: #3a3a3a; }
    .step button {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      color: #888;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 0.5rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .step button:hover { border-color: #444; color: #aaa; }
    .step button:disabled { opacity: 0.4; cursor: not-allowed; }
    .err { color: #922; font-size: 0.75rem; min-height: 1rem; }
    .progress { font-size: 0.7rem; color: #333; text-align: center; }
  </style>
</head>
<body>
  <h1>[ ACCESS PORTAL ]</h1>
  <p class="progress" id="progressText">STEP 1 OF 3</p>

  <!-- Step 1: Group Passphrase -->
  <div class="step active" id="step1">
    <h2>Group Passphrase</h2>
    <label for="passphrase">Enter group passphrase</label>
    <input type="password" id="passphrase" autocomplete="off" placeholder="••••••••••••" />
    <div class="err" id="err1"></div>
    <button id="btn1" onclick="submitStep1()">VERIFY →</button>
  </div>

  <!-- Step 2: Username + Password -->
  <div class="step" id="step2">
    <h2>Credentials</h2>
    <label for="username">Username</label>
    <input type="text" id="username" autocomplete="off" placeholder="username" />
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="off" placeholder="••••••••" />
    <div class="err" id="err2"></div>
    <button id="btn2" onclick="submitStep2()">VERIFY →</button>
  </div>

  <!-- Step 3: TOTP -->
  <div class="step" id="step3">
    <h2>Authenticator Code</h2>
    <label for="totp">6-digit code from Google Authenticator</label>
    <input type="text" id="totp" autocomplete="off" placeholder="000000" maxlength="6" inputmode="numeric" />
    <div class="err" id="err3"></div>
    <button id="btn3" onclick="submitStep3()">ENTER →</button>
  </div>

  <script>
    // Tokens stored ONLY in memory — never in localStorage/sessionStorage
    let _s1 = null, _s2 = null;

    // Determine the base path from the current URL (the hidden path)
    const BASE = window.location.pathname.replace(/\/$/, '');

    function setErr(id, msg) {
      document.getElementById(id).textContent = msg;
    }
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? 'VERIFYING...' : btn.textContent.replace('VERIFYING...', '') || 'VERIFY →';
    }
    function goToStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');
      document.getElementById('progressText').textContent = `STEP ${n} OF 3`;
    }

    async function submitStep1() {
      const passphrase = document.getElementById('passphrase').value.trim();
      if (!passphrase) return setErr('err1', 'Enter the group passphrase.');
      setErr('err1', '');
      setLoading('btn1', true);
      try {
        const r = await fetch(BASE + '/step1', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ passphrase }),
        });
        const data = await r.json();
        if (!r.ok) { setErr('err1', data.error || 'Error.'); return; }
        _s1 = data.token;
        goToStep(2);
      } catch { setErr('err1', 'Network error.'); }
      finally { setLoading('btn1', false); }
    }

    async function submitStep2() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return setErr('err2', 'Enter username and password.');
      setErr('err2', '');
      setLoading('btn2', true);
      try {
        const r = await fetch(BASE + '/step2', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, step1Token: _s1 }),
        });
        const data = await r.json();
        if (!r.ok) { setErr('err2', data.error || 'Error.'); return; }
        _s2 = data.token;
        goToStep(3);
      } catch { setErr('err2', 'Network error.'); }
      finally { setLoading('btn2', false); }
    }

    async function submitStep3() {
      const totpCode = document.getElementById('totp').value.trim();
      if (!totpCode) return setErr('err3', 'Enter your 6-digit code.');
      setErr('err3', '');
      setLoading('btn3', true);
      try {
        const r = await fetch(BASE + '/step3', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ totpCode, step2Token: _s2 }),
        });
        const data = await r.json();
        if (!r.ok) { setErr('err3', data.error || 'Error.'); return; }
        if (data.redirect) window.location.href = data.redirect;
      } catch { setErr('err3', 'Network error.'); }
      finally { setLoading('btn3', false); }
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('step1').classList.contains('active')) submitStep1();
      else if (document.getElementById('step2').classList.contains('active')) submitStep2();
      else if (document.getElementById('step3').classList.contains('active')) submitStep3();
    });
  </script>
</body>
</html>
