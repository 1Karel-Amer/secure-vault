<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: monospace;
      background: #0a0a0a;
      color: #888;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
    }
    h1 { font-size: 1rem; color: #444; }
    form {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      padding: 1.5rem;
      width: 280px;
    }
    label { font-size: 0.72rem; color: #444; }
    input {
      background: #0d0d0d;
      border: 1px solid #222;
      border-radius: 3px;
      color: #888;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 0.45rem 0.6rem;
      width: 100%;
      outline: none;
    }
    input:focus { border-color: #2a2a2a; }
    button {
      background: #181818;
      border: 1px solid #222;
      border-radius: 3px;
      color: #666;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 0.45rem;
    }
    button:hover { border-color: #333; color: #888; }
    #msg { font-size: 0.72rem; color: #6a3333; min-height: 1rem; }
  </style>
</head>
<body>
  <h1>[ LOGIN ]</h1>
  <!-- ⚠ THIS IS THE HONEYPOT — every attempt here is logged and banned -->
  <form id="loginForm" onsubmit="doLogin(event)">
    <label for="username">Username</label>
    <input type="text"     id="username" name="username" autocomplete="off" placeholder="username" />
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="off" placeholder="••••••••" />
    <div id="msg"></div>
    <button type="submit" id="submitBtn">LOGIN</button>
  </form>

  <script>
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      document.getElementById('msg').textContent = '';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const r    = await fetch('/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });
        const data = await r.json();
        document.getElementById('msg').textContent = data.error || 'Invalid credentials';
      } catch {
        document.getElementById('msg').textContent = 'Connection error.';
      }

      btn.disabled = false;
      btn.textContent = 'LOGIN';
    }
  </script>
</body>
</html>
